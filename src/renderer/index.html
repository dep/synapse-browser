<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src https: http: data: crx:"
    />
    <title>Synapse Browser</title>
  </head>
  <body>
    <div id="app" class="ai-hidden">
      <header id="topbar">
        <div id="loading-bar"></div>
        <button id="nav-back" title="Back" disabled></button>
        <button id="nav-forward" title="Forward" disabled></button>
        <button id="nav-reload" title="Reload" disabled></button>
        <div id="urlbar-wrap">
          <input id="urlbar" type="text" placeholder="Search or enter address" spellcheck="false" />
        </div>
        <button id="star" title="Bookmark this page">☆</button>
        <div id="ext-menu-wrap">
          <button id="ext-menu-toggle" title="Extensions">⋮</button>
          <div id="ext-menu" hidden>
            <browser-action-list id="actions"></browser-action-list>
          </div>
        </div>
        <button id="download-pill" hidden></button>
        <button id="ai-toggle" title="AI Assistant">✦</button>
        <div id="find-bar" hidden>
          <input id="find-input" type="text" placeholder="Find in page" spellcheck="false" />
          <span id="find-count"></span>
          <button id="find-prev" title="Previous match (Shift+Enter)">‹</button>
          <button id="find-next" title="Next match (Enter)">›</button>
          <button id="find-close" title="Close (Esc)">×</button>
        </div>
      </header>
      <div id="canvas-frame"><div id="canvas-well"></div></div>
      <aside id="sidebar">
        <div id="pin-grid" hidden></div>
        <div id="bookmarks"></div>
        <div id="tab-tools">
          <button id="new-group" class="panel-action" title="New Tab Group">＋ Group</button>
        </div>
        <div id="tab-list"></div>
        <div id="panel" hidden></div>
        <div id="sidebar-footer">
          <button id="new-tab">＋ New Tab</button>
          <button id="show-history" title="History">🕘</button>
        </div>
      </aside>
      <main id="settings" hidden></main>
      <main id="newtab" hidden></main>
      <div id="pane-glow" hidden></div>
      <aside id="ai-sidebar">
        <div id="ai-header">
          <span id="ai-title">Assistant</span>
          <button id="ai-clear" title="New conversation">Clear</button>
        </div>
        <div id="ai-messages"></div>
        <form id="ai-composer">
          <textarea
            id="ai-input"
            rows="1"
            placeholder="Ask about this page…"
            spellcheck="false"
          ></textarea>
          <button id="ai-send" type="submit" title="Send (Enter)" disabled>↑</button>
        </form>
      </aside>
      <div id="sidebar-resize"></div>
      <div id="ai-resize"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
