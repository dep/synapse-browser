appId: com.dep.synapse-browser
productName: Synapse Browser
copyright: Copyright © Danny Peck

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

protocols:
  - name: Web Page
    schemes:
      - http
      - https
    role: Viewer

mac:
  category: public.app-category.utilities
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: Websites you allow can use your microphone.
    NSCameraUsageDescription: Websites you allow can use your camera.

dmg:
  sign: false

publish:
  provider: github
  owner: dep
  repo: synapse-browser
